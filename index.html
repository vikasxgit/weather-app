<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>weather-x</title>

    <link 
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" 
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="weather-card">

            <div class="title">
                <h1>☁️ Weather Application</h1>
                <h3>Made with ❤️ | <a href="https://vikasxgit.github.io/portfolio/" style="color: white; text-decoration: none;">Vikas</a></h3>
            </div>

            <div class="search-box">
                <input type="text" id="cityInput" placeholder="Enter city name">
                <button onclick="getWeather()">Search</button>
            </div>

            <div class="loading" id="loading">Loading weather...</div>
            <div class="error" id="error">City not found. Please try again.</div>

            <div class="weather" id="weather">
                <div class="temperature" id="temperature"> --°C</div>
                <div class="city" id="city">City Name</div>
                <div class="condition" id="condition">Weather Condition</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
